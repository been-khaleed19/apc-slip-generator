<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APC Premium Slip Generator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background: radial-gradient(circle,#0f2027,#203a43,#2c5364);
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  text-align:center;
  padding:30px 15px 10px;
}

header h1{
  font-size:28px;
  letter-spacing:1px;
}

header h1 span:nth-child(1){color:#00c853;}
header h1 span:nth-child(2){color:#fff;}
header h1 span:nth-child(3){color:#29b6f6;}

header p{
  margin-top:10px;
  color:#ccc;
  font-size:14px;
}

/* MAIN WRAPPER */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
}

/* PANEL */
.left{
  width:100%;
  max-width:520px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  text-align:center;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.15);
  color:#fff;
  outline:none;
}

/* FILE BUTTON */
.file-input{
  display:block;
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:20px;
  background:linear-gradient(135deg,#ffc107,#ff9800);
  cursor:pointer;
  text-align:center;
  font-weight:bold;
}
.file-input input{display:none;}

/* PREVIEW */
#smallPreview{
  width:60px;
  height:60px;
  display:none;
  margin:10px auto;
  border-radius:8px;
}

/* BUTTONS */
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:20px;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* GENERATE */
.generate{
  background:linear-gradient(45deg,#00ffcc,#00c853);
  color:#000;
  opacity:0.5;
  pointer-events:none;
  transition:0.3s;
}

.generate.active{
  opacity:1;
  pointer-events:auto;
}

/* RESET */
.reset{
  background:#ff5252;
  color:#fff;
  display:none;
}

/* LOADER */
#loader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

.spinner{
  width:60px;
  height:60px;
  border:6px solid rgba(255,255,255,0.2);
  border-top:6px solid #00ffcc;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* MODAL */
#modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SLIP */
#slip{
  width:600px;
  height:350px;
  position:relative;
  overflow:hidden;
}

#frame{
  position:absolute;
  width:100%;
  height:100%;
}

#photoPreview{
  position:absolute;
  top:85px;
  left:40px;
  width:105px;
  height:118px;
  object-fit:cover;
}

.name{
  position:absolute;
  top:96px;
  left:160px;
  font-size:16px;
  font-weight:bold;
  color:#000;
}

.id{
  position:absolute;
  top:201px;
  left:153px;
  font-size:30px;
  font-family:'Orbitron';
  color:#000;
}

.date{
  position:absolute;
  top:124px;
  left:281px;
  font-size:13px;
  color:#000;
}

.state,.lga,.ward{
  position:absolute;
  font-size:14px;
  font-weight:bold;
  font-family:monospace;
  color:#000;
}

.state{bottom:51px;left:53px;}
.lga{bottom:54px;left:280px;}
.ward{bottom:53px;left:490px;}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <h1><span>A</span><span>P</span><span>C</span> APC Premium Slip Generator</h1>
  <p>Generate professional membership slips instantly with secure preview and download support.</p>
</header>

<div class="container">
  <div class="left">

    <input id="name" placeholder="Full Name">
    <input id="membership" placeholder="Membership ID">
    <input id="state" placeholder="State">
    <input id="lga" placeholder="LGA">
    <input id="ward" placeholder="Ward">
    <input type="date" id="date">

    <label class="file-input">
      <span id="fileText">Set Image</span>
      <input type="file" id="photo">
    </label>

    <img id="smallPreview">

    <button class="generate" onclick="generateSlip()">Generate Slip</button>
    <button class="reset" id="resetBtn" onclick="resetForm()">Reset</button>

  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Generating Slip...</p>
</div>

<!-- MODAL -->
<div id="modal">
  <div id="slip">
    <img src="frame.png" id="frame">
    <img id="photoPreview">

    <div class="name" id="sName"></div>
    <div class="id" id="sMembership"></div>
    <div class="date" id="sDate"></div>
    <div class="state" id="sState"></div>
    <div class="lga" id="sLga"></div>
    <div class="ward" id="sWard"></div>
  </div>

  <button onclick="downloadSlip()">Download</button>
  <button onclick="closeModal()">Back</button>
</div>

<footer>© Cyber Rays Tech Tsagero</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const photo=document.getElementById("photo");
const preview=document.getElementById("smallPreview");
const fileText=document.getElementById("fileText");
const resetBtn=document.getElementById("resetBtn");
const photoPreview=document.getElementById("photoPreview");
const inputs=document.querySelectorAll("input");
const generateBtn=document.querySelector(".generate");

let imageReady=false;

/* SAME LOGIC (UNCHANGED) */
function checkForm(){
  const name=document.getElementById("name").value.trim();
  const membership=document.getElementById("membership").value.trim();
  const state=document.getElementById("state").value.trim();
  const lga=document.getElementById("lga").value.trim();
  const ward=document.getElementById("ward").value.trim();
  const date=document.getElementById("date").value;

  if(name && membership && state && lga && ward && date && imageReady){
    generateBtn.classList.add("active");
  }else{
    generateBtn.classList.remove("active");
  }
}

/* INPUT */
["name","state","lga","ward"].forEach(id=>{
document.getElementById(id).addEventListener("input",function(){
this.value=this.value.toUpperCase();
});
});

inputs.forEach(input=>{
input.addEventListener("input",()=>{
checkForm();
resetBtn.style.display=[...inputs].some(i=>i.value)?"block":"none";
});
});

/* IMAGE */
photo.addEventListener("change",()=>{
const file=photo.files[0];

if(file){
const reader=new FileReader();
reader.onload=e=>{
preview.src=e.target.result;
preview.style.display="block";
photoPreview.src=e.target.result;
fileText.innerText="Change Image";
imageReady=true;
checkForm();
};
reader.readAsDataURL(file);
}else{
imageReady=false;
checkForm();
}
});

/* GENERATE */
function generateSlip(){
if(!generateBtn.classList.contains("active")) return;

document.getElementById("loader").style.display="flex";

setTimeout(()=>{

document.getElementById("sName").innerText=document.getElementById("name").value;
document.getElementById("sMembership").innerText=document.getElementById("membership").value;
document.getElementById("sDate").innerText=document.getElementById("date").value;
document.getElementById("sState").innerText=document.getElementById("state").value;
document.getElementById("sLga").innerText=document.getElementById("lga").value;
document.getElementById("sWard").innerText=document.getElementById("ward").value;

document.getElementById("loader").style.display="none";
document.getElementById("modal").style.display="flex";

},2000);
}

/* DOWNLOAD */
function downloadSlip(){
html2canvas(document.getElementById("slip"),{scale:3}).then(canvas=>{
let link=document.createElement("a");
link.download="apc-slip.png";
link.href=canvas.toDataURL();
link.click();
});
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* RESET */
function resetForm(){
inputs.forEach(i=>i.value="");
preview.style.display="none";
fileText.innerText="Set Image";
imageReady=false;
generateBtn.classList.remove("active");
resetBtn.style.display="none";
}
</script>

</body>
</html>
